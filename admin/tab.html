<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiren Board</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg:#f0f2f5; --surface:#fff; --surface2:#f8f9fb; --border:#e2e6ea;
    --accent:#1a6fc4; --accent-h:#1558a0; --text:#1a1d23; --text2:#6b7280;
    --green:#16a34a; --red:#dc2626; --radius:8px; --shadow:0 1px 3px rgba(0,0,0,.08);
}
html,body { height:auto; min-height:100vh; overflow-y:auto;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:13px; background:var(--bg); color:var(--text); line-height:1.5; }
.header { background:var(--accent); color:#fff; display:flex; align-items:center;
    padding:0 16px; height:48px; gap:10px; box-shadow:0 2px 4px rgba(0,0,0,.15);
    position:sticky; top:0; z-index:100; }
.header-title { font-size:15px; font-weight:600; flex:1; }
.header-status { font-size:12px; opacity:.75; }
.layout { display:grid; grid-template-columns:220px 260px 1fr; min-height:calc(100vh - 48px); }
.panel { border-right:1px solid var(--border); background:var(--surface); display:flex; flex-direction:column; }
.panel-header { padding:10px 12px; border-bottom:1px solid var(--border); background:var(--surface2);
    display:flex; align-items:center; gap:8px; }
.panel-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text2); flex:1; }
.panel-body { flex:1; overflow-y:auto; padding:8px 0; }
.list-item { display:flex; align-items:center; gap:8px; padding:8px 12px; cursor:pointer; transition:background .1s; }
.list-item:hover { background:var(--surface2); }
.list-item.active { background:#e8f0fb; }
.list-item.active .item-name { color:var(--accent); font-weight:600; }
.item-name { font-size:13px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.item-sub  { font-size:11px; color:var(--text2); margin-top:1px; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot.online  { background:var(--green); box-shadow:0 0 0 2px #dcfce7; }
.dot.offline { background:var(--red);   box-shadow:0 0 0 2px #fee2e2; }
.dot.unknown { background:#d1d5db; }
.main { padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
.card-header { padding:10px 14px; border-bottom:1px solid var(--border); background:var(--surface2);
    display:flex; align-items:center; gap:8px; }
.card-title { font-size:13px; font-weight:600; flex:1; }
.card-body  { padding:14px; }
.form-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.form-row:last-child { margin-bottom:0; }
.form-label { font-size:12px; color:var(--text2); width:130px; flex-shrink:0; }
.form-row input,.form-row select { flex:1; padding:6px 10px; border:1px solid var(--border);
    border-radius:6px; font-size:13px; background:var(--surface); color:var(--text); outline:none; }
.form-row input:focus,.form-row select:focus { border-color:var(--accent); }
.form-row input[type=checkbox] { flex:none; width:16px; height:16px; }
.btn { display:inline-flex; align-items:center; gap:5px; padding:6px 14px; border:none;
    border-radius:6px; font-size:12px; font-weight:500; cursor:pointer;
    transition:background .12s,opacity .12s; white-space:nowrap; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover:not(:disabled) { background:var(--accent-h); }
.btn-danger  { background:var(--red); color:#fff; }
.btn-danger:hover:not(:disabled)  { background:#b91c1c; }
.btn-ghost   { background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover:not(:disabled)   { background:var(--surface2); }
.btn-sm { padding:4px 10px; font-size:12px; }
.btn-icon { padding:4px 8px; }
.btn-group { display:flex; gap:6px; flex-wrap:wrap; }

/* Config grid — каналы в колонках */
.config-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
.config-channel { border:1px solid var(--border); border-radius:6px; padding:10px; }
.config-channel-title { font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.05em; color:var(--text2); margin-bottom:8px; }
.field { margin-bottom:8px; }
.field:last-child { margin-bottom:0; }
.field-label { font-size:11px; color:var(--text2); margin-bottom:3px; }
.field select,.field input[type=number] { width:100%; padding:5px 8px; border:1px solid var(--border);
    border-radius:5px; font-size:12px; background:var(--surface); color:var(--text); outline:none; }
.field select:focus { border-color:var(--accent); }
.field select:disabled,.field input:disabled { background:#f5f5f5; color:#aaa; cursor:not-allowed; }

/* Values table */
.values-table { width:100%; border-collapse:collapse; }
.values-table th { text-align:left; font-size:11px; font-weight:600; text-transform:uppercase;
    letter-spacing:.06em; color:var(--text2); padding:6px 12px;
    border-bottom:2px solid var(--border); background:var(--surface2); }
.values-table td { padding:6px 12px; border-bottom:1px solid var(--border); font-size:12px; }
.values-table tr:last-child td { border-bottom:none; }
.values-table tr:hover td { background:var(--surface2); }
.values-table .ch-group td:first-child { font-weight:600; color:var(--text2); padding-top:10px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
.val-number { font-variant-numeric:tabular-nums; color:var(--accent); font-weight:500; }
.val-bool-on  { color:var(--green); font-weight:600; }
.val-bool-off { color:var(--text2); }
.val-null     { color:var(--text2); font-style:italic; }
.scan-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); }
.scan-item:last-child { border-bottom:none; }
.scan-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-known   { background:#dcfce7; color:#15803d; }
.badge-unknown { background:#fef3c7; color:#92400e; }
.badge-exists  { background:#e0e7ff; color:#3730a3; }
.info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
.info-key { font-size:11px; color:var(--text2); }
.info-val { font-size:13px; font-weight:500; margin-top:1px; }
.toast { position:fixed; bottom:20px; right:20px; padding:10px 16px; border-radius:6px;
    font-size:13px; color:#fff; background:#1a1d23; opacity:0; transform:translateY(8px);
    transition:opacity .2s,transform .2s; z-index:1000; pointer-events:none; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.success { background:var(--green); }
.toast.error   { background:var(--red); }
.spinner { width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { padding:24px; text-align:center; color:var(--text2); font-size:12px; }
.progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin:8px 0; }
.progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }
</style>
</head>
<body>

<div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    <span class="header-title">Wiren Board RS485</span>
    <span class="header-status" id="headerStatus">Подключение...</span>
</div>

<div class="layout">
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Шлюзы</span>
            <button class="btn btn-primary btn-sm btn-icon" onclick="showGatewayForm(null)" title="Добавить">+</button>
        </div>
        <div class="panel-body" id="gatewayList"><div class="empty">Загрузка...</div></div>
    </div>
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title" id="devicesTitle">Устройства</span>
            <button class="btn btn-primary btn-sm btn-icon" onclick="showDeviceForm(null)" title="Добавить" id="btnAddDevice" style="display:none">+</button>
        </div>
        <div class="panel-body" id="deviceList"><div class="empty">Выберите шлюз</div></div>
    </div>
    <div class="main" id="mainContent">
        <div class="empty" style="margin-top:40px">Выберите устройство</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ─── Состояние ─────────────────────────────────────────────────────────────────
let socket = null;
const NS = 'wirenboard.0';
let adapterConfig = { gateways: [], devices: [] };
let selectedGateway = null, selectedDeviceId = null, deviceInfo = null;
let liveStates = {}, subscriptions = new Set();

// ─── Socket ────────────────────────────────────────────────────────────────────
function initSocket() {
    const s = document.createElement('script');
    s.src = '/socket.io/socket.io.js';
    s.onload = connectSocket;
    s.onerror = () => setStatus('Ошибка socket.io');
    document.head.appendChild(s);
}

function connectSocket() {
    const l = window.location;
    socket = io.connect(l.protocol + '//' + l.hostname + ':' + (l.port || 8081));
    socket.on('connect',    () => { setStatus('Подключено'); loadAll(); });
    socket.on('disconnect', () => setStatus('Нет связи'));
    socket.on('stateChange', (id, state) => {
        if (!id.startsWith(NS)) return;
        liveStates[id] = state;
        onLiveStateChange(id, state);
    });
}

function emit(cmd, ...args) {
    return new Promise((res, rej) =>
        socket.emit(cmd, ...args, (err, r) => err ? rej(new Error(err)) : res(r))
    );
}

function sendTo(command, message) {
    return new Promise((res, rej) =>
        socket.emit('sendTo', NS, command, message, r => {
            if (r && r.error) rej(new Error(r.error));
            else res(r && r.result !== undefined ? r.result : r);
        })
    );
}

// ─── Загрузка ──────────────────────────────────────────────────────────────────
async function loadAll() {
    try {
        const cfg = await sendTo('getConfig', {});
        adapterConfig = cfg || { gateways: [], devices: [] };
        await emit('subscribe', NS + '.*.info.connection');
        const objs = await emit('getObjectView', 'system', 'state',
            { startkey: NS + '.', endkey: NS + '.香' });
        const ck = (objs?.rows || []).map(r => r.id).filter(id => id.endsWith('.info.connection'));
        if (ck.length) { const st = await emit('getStates', ck); Object.assign(liveStates, st || {}); }
        renderGatewayList();
        setStatus((adapterConfig.gateways?.length || 0) + ' шлюзов, ' + (adapterConfig.devices?.length || 0) + ' устройств');
    } catch (e) { setStatus('Ошибка: ' + e.message); }
}

// ─── Утилиты ──────────────────────────────────────────────────────────────────
function makeDevId(gw, d) {
    return (gw.name || 'gw').replace(/[^a-zA-Z0-9_]/g, '_') + '_' +
           (d.name || d.deviceType + '_' + d.slaveId).replace(/[^a-zA-Z0-9_]/g, '_');
}

function devOnline(gw, d) {
    return liveStates[NS + '.' + makeDevId(gw, d) + '.info.connection']?.val;
}

// ─── Шлюзы ────────────────────────────────────────────────────────────────────
function renderGatewayList() {
    const list = document.getElementById('gatewayList');
    const gws = adapterConfig.gateways || [];
    if (!gws.length) { list.innerHTML = '<div class="empty">Нет шлюзов.<br>Нажмите + чтобы добавить.</div>'; return; }
    list.innerHTML = gws.map(gw => {
        const devs = (adapterConfig.devices || []).filter(d => d.gateway === gw.name);
        const any  = devs.some(d => devOnline(gw, d));
        const nm   = gw.name.replace(/'/g, "\'");
        return `<div class="list-item ${selectedGateway === gw.name ? 'active' : ''}" onclick="selectGateway('${nm}')">
            <div class="dot ${gw.enabled === false ? 'unknown' : any ? 'online' : 'offline'}"></div>
            <div style="flex:1;min-width:0"><div class="item-name">${gw.name}</div><div class="item-sub">${gw.host}:${gw.port}</div></div>
            <button class="btn btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();showGatewayForm('${nm}')">✎</button>
        </div>`;
    }).join('');
}

function selectGateway(name) {
    selectedGateway = name; selectedDeviceId = null;
    renderGatewayList(); renderDeviceList();
    document.getElementById('btnAddDevice').style.display = '';
    document.getElementById('devicesTitle').textContent = name;
    document.getElementById('mainContent').innerHTML =
        '<div class="empty" style="margin-top:40px">Выберите устройство или нажмите «Сканировать»</div>';
}

function showGatewayForm(gwName) {
    const gw = gwName ? (adapterConfig.gateways || []).find(g => g.name === gwName) : null;
    document.getElementById('mainContent').innerHTML = `
    <div class="card"><div class="card-header"><span class="card-title">${gw ? 'Редактировать шлюз' : 'Новый шлюз'}</span></div>
    <div class="card-body">
        <div class="form-row"><span class="form-label">Название</span><input id="gw_name" value="${gw?.name || ''}"></div>
        <div class="form-row"><span class="form-label">IP адрес</span><input id="gw_host" value="${gw?.host || ''}"></div>
        <div class="form-row"><span class="form-label">TCP порт</span><input id="gw_port" type="number" value="${gw?.port || 23}"></div>
        <div class="form-row"><span class="form-label">Интервал опроса (мс)</span><input id="gw_poll" type="number" value="${gw?.pollInterval || 10000}"></div>
        <div class="form-row"><span class="form-label">Активен</span><input id="gw_enabled" type="checkbox" ${gw?.enabled !== false ? 'checked' : ''}></div>
        <div class="btn-group" style="margin-top:12px">
            <button class="btn btn-primary" onclick="saveGateway('${gwName || ''}')">Сохранить</button>
            ${gw ? `<button class="btn btn-danger" onclick="deleteGateway('${gwName}')">Удалить</button>` : ''}
            <button class="btn btn-ghost" onclick="document.getElementById('mainContent').innerHTML=''">Отмена</button>
        </div>
    </div></div>`;
}

async function saveGateway(oldName) {
    const name    = document.getElementById('gw_name').value.trim();
    const host    = document.getElementById('gw_host').value.trim();
    const port    = parseInt(document.getElementById('gw_port').value);
    const poll    = parseInt(document.getElementById('gw_poll').value);
    const enabled = document.getElementById('gw_enabled').checked;
    if (!name || !host) { showToast('Заполните название и IP', 'error'); return; }
    const gws = adapterConfig.gateways || [];
    const idx = oldName ? gws.findIndex(g => g.name === oldName) : -1;
    const newGw = { name, host, port, pollInterval: poll, enabled };
    if (idx >= 0) {
        gws[idx] = newGw;
        if (oldName !== name) (adapterConfig.devices || []).forEach(d => { if (d.gateway === oldName) d.gateway = name; });
    } else {
        gws.push(newGw);
    }
    await persistConfig();
    renderGatewayList();
    showToast('Шлюз сохранён. Перезапустите адаптер.', 'success');
}

async function deleteGateway(name) {
    if (!confirm(`Удалить шлюз "${name}"?`)) return;
    adapterConfig.gateways = (adapterConfig.gateways || []).filter(g => g.name !== name);
    adapterConfig.devices  = (adapterConfig.devices  || []).filter(d => d.gateway !== name);
    if (selectedGateway === name) { selectedGateway = null; selectedDeviceId = null; }
    await persistConfig(); renderGatewayList(); renderDeviceList();
    showToast('Шлюз удалён.', 'success');
}

// ─── Устройства ────────────────────────────────────────────────────────────────
function renderDeviceList() {
    const list = document.getElementById('deviceList');
    if (!selectedGateway) { list.innerHTML = '<div class="empty">Выберите шлюз</div>'; return; }
    const gw   = (adapterConfig.gateways || []).find(g => g.name === selectedGateway) || { name: selectedGateway };
    const devs = (adapterConfig.devices  || []).filter(d => d.gateway === selectedGateway);
    if (!devs.length) {
        list.innerHTML = '<div class="empty">Нет устройств.<br><button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="startScan()">Сканировать шину</button></div>';
        return;
    }
    list.innerHTML = devs.map(d => {
        const devId  = makeDevId(gw, d);
        const online = devOnline(gw, d);
        const nm     = d.name.replace(/'/g, "\'");
        return `<div class="list-item ${selectedDeviceId === devId ? 'active' : ''}" onclick="selectDevice('${devId}')">
            <div class="dot ${d.enabled === false ? 'unknown' : online ? 'online' : 'offline'}"></div>
            <div style="flex:1;min-width:0"><div class="item-name">${d.name}</div><div class="item-sub">${d.deviceType} · ID ${d.slaveId}</div></div>
            <button class="btn btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();showDeviceForm('${devId}')">✎</button>
        </div>`;
    }).join('') +
    '<div style="padding:8px 12px;border-top:1px solid var(--border);margin-top:4px">' +
    '<button class="btn btn-ghost btn-sm" style="width:100%" onclick="startScan()">🔍 Сканировать шину</button></div>';
}

const DEVICE_TYPES = [
    'WB-MAI6-since-fw-2.2', 'WB-M1W2-MULTIPLE-W1', 'WB-MAP3E',
    'WB-MAP12E', 'WB-MS', 'WB-MR6C'
];

function showDeviceForm(devId) {
    const gw  = (adapterConfig.gateways || []).find(g => g.name === selectedGateway) || { name: selectedGateway };
    const dev = devId ? (adapterConfig.devices || []).find(d => makeDevId(gw, d) === devId) : null;
    const opts = DEVICE_TYPES.map(t =>
        `<option value="${t}" ${dev?.deviceType === t ? 'selected' : ''}>${t}</option>`
    ).join('');
    document.getElementById('mainContent').innerHTML = `
    <div class="card"><div class="card-header"><span class="card-title">${dev ? 'Редактировать' : 'Новое устройство'}</span></div>
    <div class="card-body">
        <div class="form-row"><span class="form-label">Название</span><input id="dev_name" value="${dev?.name || ''}"></div>
        <div class="form-row"><span class="form-label">Slave ID</span><input id="dev_slave" type="number" value="${dev?.slaveId || 1}" min="1" max="247"></div>
        <div class="form-row"><span class="form-label">Тип устройства</span><select id="dev_type">${opts}</select></div>
        <div class="form-row"><span class="form-label">Активно</span><input id="dev_enabled" type="checkbox" ${dev?.enabled !== false ? 'checked' : ''}></div>
        <div class="btn-group" style="margin-top:12px">
            <button class="btn btn-primary" onclick="saveDevice('${devId || ''}')">Сохранить</button>
            ${dev ? `<button class="btn btn-danger" onclick="deleteDevice('${devId}')">Удалить</button>` : ''}
            <button class="btn btn-ghost" onclick="renderDeviceList();document.getElementById('mainContent').innerHTML=''">Отмена</button>
        </div>
    </div></div>`;
}

async function saveDevice(oldDevId) {
    const name    = document.getElementById('dev_name').value.trim();
    const slaveId = parseInt(document.getElementById('dev_slave').value);
    const type    = document.getElementById('dev_type').value;
    const enabled = document.getElementById('dev_enabled').checked;
    if (!name) { showToast('Введите название', 'error'); return; }
    const gw   = (adapterConfig.gateways || []).find(g => g.name === selectedGateway) || { name: selectedGateway };
    const devs = adapterConfig.devices || (adapterConfig.devices = []);
    const newDev = { name, gateway: selectedGateway, slaveId, deviceType: type, enabled };
    if (oldDevId) {
        const idx = devs.findIndex(d => makeDevId(gw, d) === oldDevId);
        if (idx >= 0) devs[idx] = newDev; else devs.push(newDev);
    } else {
        devs.push(newDev);
    }
    await persistConfig(); renderDeviceList();
    showToast('Устройство сохранено. Перезапустите адаптер.', 'success');
}

async function deleteDevice(devId) {
    if (!confirm('Удалить устройство?')) return;
    const gw = (adapterConfig.gateways || []).find(g => g.name === selectedGateway) || { name: selectedGateway };
    adapterConfig.devices = (adapterConfig.devices || []).filter(d => makeDevId(gw, d) !== devId);
    if (selectedDeviceId === devId) selectedDeviceId = null;
    await persistConfig(); renderDeviceList();
    showToast('Устройство удалено.', 'success');
}

// ─── Панель устройства ─────────────────────────────────────────────────────────
async function selectDevice(devId) {
    selectedDeviceId = devId; renderDeviceList();
    document.getElementById('mainContent').innerHTML =
        '<div class="empty" style="margin-top:40px"><div class="spinner" style="border-top-color:var(--accent);border-color:var(--border);width:24px;height:24px;border-width:3px"></div></div>';
    try {
        deviceInfo = await sendTo('getDeviceInfo', { deviceId: devId });
        if (!subscriptions.has(devId)) {
            await emit('subscribe', NS + '.' + devId + '.*');
            subscriptions.add(devId);
        }
        const res  = await emit('getObjectView', 'system', 'state',
            { startkey: NS + '.' + devId + '.', endkey: NS + '.' + devId + '.香' });
        const keys = (res?.rows || []).map(r => r.id);
        if (keys.length) { const st = await emit('getStates', keys); Object.assign(liveStates, st || {}); }
        renderDevicePanel();
    } catch (e) {
        document.getElementById('mainContent').innerHTML =
            `<div class="empty" style="color:var(--red)">${e.message}</div>`;
    }
}

function renderDevicePanel() {
    if (!deviceInfo) return;
    const d      = deviceInfo;
    const online = liveStates[NS + '.' + d.deviceId + '.info.connection']?.val;
    document.getElementById('mainContent').innerHTML = `
    <div class="card"><div class="card-header">
        <div class="dot ${online ? 'online' : 'offline'}"></div>
        <span class="card-title">${d.name}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;
            background:${online ? '#dcfce7' : '#fee2e2'};color:${online ? '#15803d' : '#b91c1c'}">
            ${online ? 'Онлайн' : 'Офлайн'}</span>
        <button class="btn btn-ghost btn-sm" onclick="restartAdapter()" style="margin-left:auto">↻ Перезапустить</button>
    </div><div class="card-body">
        <div class="info-grid">
            <div><div class="info-key">Тип</div><div class="info-val">${d.deviceType}</div></div>
            ${d.serial ? `<div><div class="info-key">Серийный номер</div><div class="info-val">${d.serial}</div></div>` : ''}
            ${d.info?.fwVersion ? `<div><div class="info-key">Прошивка</div><div class="info-val">${d.info.fwVersion}</div></div>` : ''}
        </div>
    </div></div>
    <div class="card"><div class="card-header"><span class="card-title">Настройки каналов</span></div>
    <div class="card-body">
        ${renderConfigForm(d)}
        <div class="btn-group" style="margin-top:14px">
            <button class="btn btn-primary" onclick="applyConfig()" id="btnApply">Применить</button>
            <button class="btn btn-ghost"   onclick="readFromDevice()" id="btnRead">Прочитать с устройства</button>
        </div>
    </div></div>
    <div class="card"><div class="card-header"><span class="card-title">Текущие значения</span></div>
    <div class="card-body" style="padding:0">${renderValuesTable(d)}</div></div>`;
}

// ─── Форма конфигурации ────────────────────────────────────────────────────────
// savedConfig = {
//   flat:     { in1_mode: 0, in2_mode: 1 },   // holding-параметры (определяют топологию)
//   sensors:  { gg_in1_temp: 3 },               // кол-во 1-Wire датчиков на канал
//   settings: { l1: { turns: 100 } },           // rw-настройки каналов
// }

function renderConfigForm(d) {
    const allChannels = d.channels || [];
    const sc       = d.savedConfig || {};
    const flat     = sc.flat     || {};
    const sensors  = sc.sensors  || {};
    const settings = sc.settings || {};

    // flat-параметры берём из d.configParams (in1_mode и т.д.)
    // Они хранятся отдельно от каналов т.к. их group не совпадает с group каналов
    const configParams = d.configParams || [];

    let html = '';

    // ── Режимы входов (configParams) ────────────────────────────────────
    // Группируем попарно: in1_type + in1_n_type → одна карточка "Вход 1"
    if (configParams.length) {
        html += '<div style="margin-bottom:14px">';
        html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:8px">Режимы входов</div>';
        html += '<div class="config-grid">';

        // Собираем уникальные номера входов из id вида inN_type / inN_n_type
        const inputNums = [...new Set(configParams.map(s => {
            const m = s.id.match(/^in(\d+)_/);
            return m ? m[1] : null;
        }).filter(Boolean))].sort((a,b) => Number(a)-Number(b));

        if (inputNums.length) {
            // Сгруппированный вид: одна карточка на вход
            for (const n of inputNums) {
                const pParam = configParams.find(s => s.id === 'in' + n + '_type');
                const nParam = configParams.find(s => s.id === 'in' + n + '_n_type');
                html += '<div class="config-channel"><div class="config-channel-title">Вход ' + n + '</div>';
                for (const s of [pParam, nParam].filter(Boolean)) {
                    const label = s.id.includes('_n_type') ? 'N-вход' : 'P-вход';
                    const cur   = flat[s.id] !== undefined ? Number(flat[s.id]) : -1;
                    const opts  = Object.entries(s.states || {}).map(([v, lbl]) =>
                        '<option value="' + v + '"' + (Number(v) === cur ? ' selected' : '') + '>' + lbl + '</option>'
                    ).join('');
                    html += '<div class="field"><div class="field-label">' + label + '</div>' +
                        '<select data-flat="' + s.id + '" onchange="onFlatChange(this)">' +
                        '<option value="-1"' + (cur === -1 ? ' selected' : '') + '>— не задано —</option>' +
                        opts + '</select></div>';
                }
                html += '</div>';
            }
        } else {
            // Fallback: просто список
            for (const s of configParams) {
                const cur  = flat[s.id] !== undefined ? Number(flat[s.id]) : -1;
                const opts = Object.entries(s.states || {}).map(([v, lbl]) =>
                    '<option value="' + v + '"' + (Number(v) === cur ? ' selected' : '') + '>' + lbl + '</option>'
                ).join('');
                html += '<div class="config-channel">' +
                    '<div class="config-channel-title">' + s.name + '</div>' +
                    '<div class="field"><select data-flat="' + s.id + '" onchange="onFlatChange(this)">' +
                    '<option value="-1"' + (cur === -1 ? ' selected' : '') + '>— не задано —</option>' +
                    opts + '</select></div></div>';
            }
        }
        html += '</div></div>';
    }

    // ── Количество 1-Wire датчиков ───────────────────────────────────────
    // Показываем только каналы у которых активен режим 1-wire.
    // Определяем через condition канала: "in1_mode==0" при flat.in1_mode===0
    const sensorChannels = allChannels.filter(ch => {
        if (!(ch.measurements || []).some(m => /^bus\d+_temp\d+$/.test(m.id))) return false;
        // Если у канала есть condition — проверяем что он выполняется при текущем flat
        if (ch.condition) {
            return evalCondUI(ch.condition, flat);
        }
        return true;
    });
    if (sensorChannels.length) {
        html += '<div style="margin-bottom:14px">';
        html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:8px">Датчики 1-Wire</div>';
        html += '<div class="config-grid">';
        for (const ch of sensorChannels) {
            const maxN = (ch.measurements || []).filter(m => /^bus\d+_temp\d+$/.test(m.id)).length;
            const cur  = sensors[ch.id] !== undefined ? sensors[ch.id] : 0;
            html += '<div class="config-channel">' +
                '<div class="config-channel-title">' + ch.name + '</div>' +
                '<div class="field"><div class="field-label">Доп. датчиков на шине (0–' + maxN + ')</div>' +
                '<input type="number" min="0" max="' + maxN + '" value="' + cur + '" data-sensor="' + ch.id + '">' +
                '</div></div>';
        }
        html += '</div></div>';
    }

    // ── rw-настройки каналов (turns, phi и т.д.) ────────────────────────
    const flatIds   = new Set(configParams.map(s => s.id));
    const rwChannels = allChannels.filter(ch =>
        (ch.settings || []).some(s => !flatIds.has(s.id))
    );
    if (rwChannels.length) {
        html += '<div>';
        html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:8px">Настройки каналов</div>';
        html += '<div class="config-grid">';
        for (const ch of rwChannels) {
            const chCfg  = settings[ch.id] || {};
            const rwSets = (ch.settings || []).filter(s => !flatIds.has(s.id));
            if (!rwSets.length) continue;
            const fields = rwSets.map(s => {
                const cur    = chCfg[s.id] !== undefined ? chCfg[s.id] : (s.default ?? 0);
                const locked = s.write === false;
                if (s.states && Object.keys(s.states).length) {
                    const opts = Object.entries(s.states).map(([v, lbl]) =>
                        '<option value="' + v + '"' + (Number(v) === Number(cur) ? ' selected' : '') + '>' + lbl + '</option>'
                    ).join('');
                    return '<div class="field"><div class="field-label">' + s.name + '</div>' +
                        '<select data-ch="' + ch.id + '" data-setting="' + s.id + '"' + (locked ? ' disabled' : '') + '>' +
                        opts + '</select></div>';
                }
                const minA = s.min !== null ? ' min="' + s.min + '"' : '';
                const maxA = s.max !== null ? ' max="' + s.max + '"' : '';
                return '<div class="field"><div class="field-label">' + s.name + '</div>' +
                    '<input type="number"' + minA + maxA + ' value="' + cur + '"' +
                    ' data-ch="' + ch.id + '" data-setting="' + s.id + '"' + (locked ? ' disabled' : '') + '></div>';
            }).join('');
            html += '<div class="config-channel"><div class="config-channel-title">' + ch.name + '</div>' + fields + '</div>';
        }
        html += '</div></div>';
    }

    return html || '<div style="color:var(--text2)">Нет настраиваемых параметров</div>';
}

// Простой evaluator conditions для UI (без зависимостей)
function evalCondUI(condition, flatCfg) {
    if (!condition) return true;
    const cond = condition.replace(/\s+/g,'').replace(/[()]/g,'');
    return cond.split('||').some(part => part.split('&&').every(expr => {
        let m;
        m = expr.match(/^(\w+)==(-?\d+)$/); if (m) return Number(flatCfg[m[1]]) === parseInt(m[2]);
        m = expr.match(/^(\w+)!=(-?\d+)$/); if (m) return Number(flatCfg[m[1]]) !== parseInt(m[2]);
        m = expr.match(/^(\w+)>=(- ?\d+)$/); if (m) return Number(flatCfg[m[1]]) >= parseInt(m[2]);
        m = expr.match(/^(\w+)<=(- ?\d+)$/); if (m) return Number(flatCfg[m[1]]) <= parseInt(m[2]);
        return true;
    }));
}

function onFlatChange(el) {
    if (!deviceInfo) return;
    if (!deviceInfo.savedConfig) deviceInfo.savedConfig = {};
    if (!deviceInfo.savedConfig.flat) deviceInfo.savedConfig.flat = {};
    deviceInfo.savedConfig.flat[el.dataset.flat] = Number(el.value);
    // Перерисовываем форму реактивно — секция датчиков зависит от режима
    const body = el.closest('.card-body');
    if (body) {
        const btns = body.querySelector('.btn-group');
        const newForm = document.createElement('div');
        newForm.innerHTML = renderConfigForm(deviceInfo);
        body.innerHTML = '';
        while (newForm.firstChild) body.appendChild(newForm.firstChild);
        if (btns) body.appendChild(btns);
    }
}

function collectConfig() {
    const flat = {}, sensors = {}, settings = {};

    document.querySelectorAll('[data-flat]').forEach(el => {
        flat[el.dataset.flat] = Number(el.value);
    });
    document.querySelectorAll('[data-sensor]').forEach(el => {
        sensors[el.dataset.sensor] = Number(el.value);
    });
    document.querySelectorAll('[data-ch][data-setting]').forEach(el => {
        if (el.disabled) return;
        const chId = el.dataset.ch, sId = el.dataset.setting;
        if (!settings[chId]) settings[chId] = {};
        settings[chId][sId] = Number(el.value);
    });

    return { flat, sensors, settings };
}

async function applyConfig() {
    const btn = document.getElementById('btnApply');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Применяю...';
    try {
        const config = collectConfig();
        await sendTo('applyConfig', { deviceId: selectedDeviceId, config });
        deviceInfo.savedConfig = config;
        showToast('Конфигурация применена', 'success');
        // Обновляем значения через 1.5с (дать время поллингу)
        setTimeout(async () => {
            const r = await emit('getObjectView', 'system', 'state',
                { startkey: NS + '.' + selectedDeviceId + '.', endkey: NS + '.' + selectedDeviceId + '.香' });
            const ks = (r?.rows || []).map(x => x.id);
            if (ks.length) { const st = await emit('getStates', ks); Object.assign(liveStates, st || {}); }
            renderDevicePanel();
        }, 1500);
    } catch (e) {
        showToast('Ошибка: ' + e.message, 'error');
    } finally {
        btn.disabled = false; btn.innerHTML = 'Применить';
    }
}

async function readFromDevice() {
    const btn = document.getElementById('btnRead');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try {
        deviceInfo = await sendTo('getDeviceInfo', { deviceId: selectedDeviceId });
        renderDevicePanel();
        showToast('Прочитано', 'success');
    } catch (e) {
        showToast('Ошибка: ' + e.message, 'error');
    } finally {
        btn.disabled = false; btn.innerHTML = 'Прочитать с устройства';
    }
}

// ─── Таблица значений ──────────────────────────────────────────────────────────
// Новая иерархия: NS.deviceId.channelId.measurementId

function renderValuesTable(d) {
    const prefix   = NS + '.' + d.deviceId + '.';
    const channels = d.channels || [];

    // Группируем liveStates по channelId
    const byChannel = {};
    for (const [id, state] of Object.entries(liveStates)) {
        if (!id.startsWith(prefix)) continue;
        if (id.endsWith('.info.connection') || id.endsWith('.config')) continue;
        const rel = id.slice(prefix.length);          // channelId.measurementId
        const dot = rel.indexOf('.');
        if (dot < 0) continue;
        const chId = rel.slice(0, dot);
        const mId  = rel.slice(dot + 1);
        if (chId === 'info') continue;
        if (!byChannel[chId]) byChannel[chId] = [];
        byChannel[chId].push({ id, mId, state });
    }

    const chIds = Object.keys(byChannel);
    if (!chIds.length) {
        return '<div style="padding:14px;color:var(--text2);font-size:12px">Нет данных. Дождитесь поллинга или примените конфигурацию.</div>';
    }

    // Находим имя канала из deviceInfo.channels
    const chNameMap = {};
    for (const ch of channels) chNameMap[ch.id] = ch.name;

    let rows = '';
    for (const chId of chIds.sort()) {
        const chName = chNameMap[chId] || chId;
        rows += `<tr class="ch-group"><td colspan="3">${chName}</td></tr>`;
        for (const { id, mId, state } of byChannel[chId].sort((a, b) => a.mId.localeCompare(b.mId))) {
            const safeId = id.replace(/\./g, '_');
            rows += `<tr>
                <td style="padding-left:20px">${mId}</td>
                <td id="val-${safeId}">${fmtVal(state)}</td>
                <td style="color:var(--text2);font-size:11px">${fmtTs(state?.ts)}</td>
            </tr>`;
        }
    }

    return `<table class="values-table">
        <thead><tr><th>Канал / Измерение</th><th>Значение</th><th>Обновлено</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
}

// ─── Сканирование ─────────────────────────────────────────────────────────────
async function startScan() {
    if (!selectedGateway) { showToast('Выберите шлюз', 'error'); return; }
    const gw = (adapterConfig.gateways || []).find(g => g.name === selectedGateway);
    if (!gw) return;
    document.getElementById('mainContent').innerHTML = `
    <div class="card"><div class="card-header">
        <span class="card-title">🔍 Сканирование шины</span>
    </div><div class="card-body">
        <div style="margin-bottom:8px;color:var(--text2);font-size:12px">Шлюз: <b>${gw.name}</b> (${gw.host}:${gw.port})</div>
        <div class="form-row">
            <span class="form-label">Диапазон адресов</span>
            <input id="scan_from" type="number" value="1"   min="1" max="247" style="width:70px;flex:none">
            <span style="color:var(--text2)">—</span>
            <input id="scan_to"   type="number" value="247" min="1" max="247" style="width:70px;flex:none">
            <button class="btn btn-primary btn-sm" onclick="runScan('${gw.name.replace(/'/g,"\\'")}','${gw.host}',${gw.port})">Начать</button>
        </div>
        <div class="progress-bar" id="scanProgress" style="display:none"><div class="progress-fill" id="scanFill" style="width:0%"></div></div>
        <div id="scanStatus" style="font-size:12px;color:var(--text2);margin:6px 0"></div>
        <div id="scanResults"></div>
    </div></div>`;
}

const SIG_MAP = {
    'WBMAI6': 'WB-MAI6-since-fw-2.2', 'WBMAP3E': 'WB-MAP3E', 'WBMAP12E': 'WB-MAP12E',
    'WBM1W2': 'WB-M1W2-MULTIPLE-W1',  'WBMR6C':  'WB-MR6C',  'WBMS':    'WB-MS'
};

async function runScan(gwName, host, port) {
    const from = parseInt(document.getElementById('scan_from').value);
    const to   = parseInt(document.getElementById('scan_to').value);
    document.getElementById('scanProgress').style.display = '';
    document.getElementById('scanFill').style.width = '0%';
    document.getElementById('scanStatus').textContent = 'Сканирование...';
    document.getElementById('scanResults').innerHTML = '';
    try {
        const found = await sendTo('scan', { host, port, from, to });
        document.getElementById('scanFill').style.width = '100%';
        document.getElementById('scanStatus').textContent = 'Готово. Найдено: ' + (found?.length || 0);
        const exists = (adapterConfig.devices || []).filter(d => d.gateway === gwName).map(d => d.slaveId);
        renderScanResults(found || [], exists, gwName);
    } catch (e) {
        document.getElementById('scanStatus').textContent = 'Ошибка: ' + e.message;
    }
}

function renderScanResults(found, exists, gwName) {
    const el = document.getElementById('scanResults');
    if (!found.length) { el.innerHTML = ''; return; }
    el.innerHTML = '<div style="margin-top:10px;border:1px solid var(--border);border-radius:6px;overflow:hidden">' +
        found.map(f => {
            const dt = SIG_MAP[f.signature];
            const ex = exists.includes(f.slaveId);
            return `<div class="scan-item">
                <div style="font-family:monospace;font-size:12px;width:30px;color:var(--text2)">${f.slaveId}</div>
                <div style="flex:1"><div style="font-size:13px;font-weight:500">${dt || f.signature}</div>
                    <div style="font-size:11px;color:var(--text2)">${f.signature}</div></div>
                <span class="scan-badge ${ex ? 'badge-exists' : dt ? 'badge-known' : 'badge-unknown'}">
                    ${ex ? 'Добавлено' : dt ? 'Поддерживается' : 'Неизвестен'}</span>
                ${!ex && dt ? `<button class="btn btn-primary btn-sm" onclick="addFound('${gwName}',${f.slaveId},'${dt}')">+ Добавить</button>` : ''}
            </div>`;
        }).join('') + '</div>';
}

async function addFound(gwName, slaveId, devType) {
    const name = prompt(`Название (slave ${slaveId}):`, devType + '_' + slaveId);
    if (!name) return;
    (adapterConfig.devices || (adapterConfig.devices = [])).push(
        { name, gateway: gwName, slaveId, deviceType: devType, enabled: true }
    );
    await persistConfig(); renderDeviceList();
    showToast('Добавлено. Перезапустите адаптер.', 'success');
}

// ─── Прочее ───────────────────────────────────────────────────────────────────
async function restartAdapter() {
    if (!confirm('Перезапустить адаптер?')) return;
    try { await sendTo('restart', {}); showToast('Перезапуск...', 'success'); setTimeout(() => loadAll(), 4000); }
    catch (e) { showToast('Ошибка: ' + e.message, 'error'); }
}

function onLiveStateChange(id, state) {
    const el = document.getElementById('val-' + id.replace(/\./g, '_'));
    if (el) {
        el.innerHTML = fmtVal(state);
        const row = el.closest('tr');
        if (row?.cells[2]) row.cells[2].textContent = fmtTs(state?.ts);
    }
    if (id.endsWith('.info.connection')) { renderGatewayList(); renderDeviceList(); }
}

async function persistConfig() {
    await sendTo('saveConfig', { gateways: adapterConfig.gateways, devices: adapterConfig.devices });
}

function fmtVal(s) {
    if (!s) return '<span class="val-null">—</span>';
    const v = s.val;
    if (v === null || v === undefined) return '<span class="val-null">нет данных</span>';
    if (typeof v === 'boolean') return v ? '<span class="val-bool-on">● Вкл</span>' : '<span class="val-bool-off">○ Выкл</span>';
    if (typeof v === 'number')  return `<span class="val-number">${Math.round(v * 1000) / 1000}</span>`;
    return String(v);
}

function fmtTs(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return String(d.getHours()).padStart(2,'0') + ':' +
           String(d.getMinutes()).padStart(2,'0') + ':' +
           String(d.getSeconds()).padStart(2,'0');
}

function setStatus(msg) { document.getElementById('headerStatus').textContent = msg; }

let toastTimer;
function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${type}`;
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.className = 'toast', 3500);
}

initSocket();
</script>
