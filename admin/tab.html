<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiren Board</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:        #f0f2f5;
    --surface:   #ffffff;
    --surface2:  #f8f9fb;
    --border:    #e2e6ea;
    --accent:    #1a6fc4;
    --accent-h:  #1558a0;
    --text:      #1a1d23;
    --text2:     #6b7280;
    --green:     #16a34a;
    --red:       #dc2626;
    --amber:     #d97706;
    --radius:    8px;
    --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
}

/* ── Layout ─────────────────────────────────────────────────────────── */
.layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    gap: 0;
}

/* ── Header ─────────────────────────────────────────────────────────── */
.header {
    grid-column: 1 / -1;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    box-shadow: 0 2px 4px rgba(0,0,0,.15);
}
.header-title { font-size: 15px; font-weight: 600; flex: 1; }
.header-status { font-size: 12px; opacity: .75; }

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
}
.sidebar-section { padding: 0 12px 8px; }
.sidebar-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text2);
    padding: 8px 4px 4px;
}

.device-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .12s;
    margin: 1px 0;
}
.device-item:hover { background: var(--surface2); }
.device-item.active { background: #e8f0fb; }
.device-item.active .device-name { color: var(--accent); font-weight: 600; }

.dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}
.dot.online  { background: var(--green); box-shadow: 0 0 0 2px #dcfce7; }
.dot.offline { background: var(--red);   box-shadow: 0 0 0 2px #fee2e2; }

.device-name  { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.device-type  { font-size: 11px; color: var(--text2); }

/* ── Main ─────────────────────────────────────────────────────────────── */
.main {
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    gap: 8px;
}
.empty-state svg { opacity: .3; }

/* ── Card ─────────────────────────────────────────────────────────────── */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
}
.card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
}
.card-title { font-size: 13px; font-weight: 600; flex: 1; }
.card-body  { padding: 16px; }

/* ── Info grid ───────────────────────────────────────────────────────── */
.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
}
.info-item {}
.info-key   { font-size: 11px; color: var(--text2); }
.info-val   { font-size: 13px; font-weight: 500; margin-top: 1px; }

/* ── Config form ─────────────────────────────────────────────────────── */
.config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
}
.field {}
.field-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.field select, .field input[type=number] {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
}
.field select:focus, .field input[type=number]:focus {
    border-color: var(--accent);
}

/* сенсоры-счётчик */
.sensors-field {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
}
.sensors-field input {
    width: 64px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    text-align: center;
}
.sensors-field label { font-size: 12px; color: var(--text2); }

.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s, opacity .12s;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-h); }
.btn-ghost   { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { background: var(--surface2); }

/* ── Values table ─────────────────────────────────────────────────────── */
.values-table { width: 100%; border-collapse: collapse; }
.values-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text2);
    padding: 6px 12px;
    border-bottom: 2px solid var(--border);
    background: var(--surface2);
}
.values-table td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
}
.values-table tr:last-child td { border-bottom: none; }
.values-table tr:hover td { background: var(--surface2); }

.val-number { font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 500; }
.val-bool-on  { color: var(--green); font-weight: 600; }
.val-bool-off { color: var(--text2); }
.val-null     { color: var(--text2); font-style: italic; }
.val-error    { color: var(--red); }

/* ── Toast ───────────────────────────────────────────────────────────── */
.toast {
    position: fixed;
    bottom: 20px; right: 20px;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    color: #fff;
    background: #1a1d23;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .2s, transform .2s;
    z-index: 1000;
    pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }

.spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
}
.badge-online  { background: #dcfce7; color: #15803d; }
.badge-offline { background: #fee2e2; color: #b91c1c; }
</style>
</head>
<body>

<div class="layout">
    <header class="header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
        </svg>
        <span class="header-title">Wiren Board RS485</span>
        <span class="header-status" id="headerStatus">Подключение...</span>
    </header>

    <nav class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-label">Устройства</div>
            <div id="deviceList">
                <div style="padding:12px;color:var(--text2);font-size:12px">Загрузка...</div>
            </div>
        </div>
    </nav>

    <main class="main" id="mainContent">
        <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/>
            </svg>
            <span>Выберите устройство</span>
        </div>
    </main>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ── Состояние ──────────────────────────────────────────────────────────
let socket = null;
let namespace = 'wirenboard.0';
let devices = [];          // список устройств из config
let selectedDeviceId = null;
let deviceInfo = null;     // getDeviceInfo ответ
let liveStates = {};       // id → {val, ts}
let subscribed = false;

// ── Socket.io ──────────────────────────────────────────────────────────
function initSocket() {
    const script = document.createElement('script');
    script.src = '/socket.io/socket.io.js';
    script.onload = connectSocket;
    script.onerror = () => showError('Не удалось загрузить socket.io');
    document.head.appendChild(script);
}

function connectSocket() {
    const loc = window.location;
    socket = io.connect(loc.protocol + '//' + loc.hostname + ':' + (loc.port || 8081));

    socket.on('connect', () => {
        document.getElementById('headerStatus').textContent = 'Подключено';
        loadDevices();
    });

    socket.on('disconnect', () => {
        document.getElementById('headerStatus').textContent = 'Нет связи';
    });

    socket.on('stateChange', (id, state) => {
        if (!id.startsWith(namespace)) return;
        liveStates[id] = state;
        updateLiveValue(id, state);
    });
}

function emit(cmd, ...args) {
    return new Promise((res, rej) => {
        socket.emit(cmd, ...args, (err, result) => err ? rej(new Error(err)) : res(result));
    });
}

// ── Загрузка конфигурации ──────────────────────────────────────────────
async function loadDevices() {
    try {
        // Читаем native конфиг адаптера
        const obj = await emit('getObject', `system.adapter.${namespace}`);
        const native = obj && obj.native || {};
        devices = (native.devices || []).filter(d => d.enabled !== false);

        renderDeviceList();

        // Читаем текущие connection стейты
        try {
            const connKeys = devices.map(d => {
                const gw = (d.gateway || 'gw').replace(/[^a-zA-Z0-9_]/g, '_');
                const dn = (d.name || `${d.deviceType}_${d.slaveId}`).replace(/[^a-zA-Z0-9_]/g, '_');
                return `${namespace}.${gw}_${dn}.info.connection`;
            });
            const connStates = await emit('getStates', connKeys);
            Object.assign(liveStates, connStates || {});
            renderDeviceList();
        } catch (_) {} 

        // Подписываемся на connection-стейты
        await emit('subscribe', `${namespace}.*.info.connection`);

        document.getElementById('headerStatus').textContent =
            `${devices.length} устройств`;
    } catch (e) {
        showError('Ошибка загрузки: ' + e.message);
    }
}

// ── Рендер списка устройств ────────────────────────────────────────────
function renderDeviceList() {
    const list = document.getElementById('deviceList');
    if (!devices.length) {
        list.innerHTML = '<div style="padding:8px 4px;color:var(--text2);font-size:12px">Нет устройств.<br>Добавьте в настройках.</div>';
        return;
    }

    list.innerHTML = devices.map(d => {
        const gw = (d.gateway || 'gw').replace(/[^a-zA-Z0-9_]/g, '_');
        const dn = (d.name || `${d.deviceType}_${d.slaveId}`).replace(/[^a-zA-Z0-9_]/g, '_');
        const deviceId = `${namespace}.${gw}_${dn}`;
        const connState = liveStates[`${deviceId}.info.connection`];
        const online = connState && connState.val;

        return `<div class="device-item ${selectedDeviceId === deviceId ? 'active' : ''}"
                     onclick="selectDevice('${deviceId}', '${d.deviceType}')">
            <div class="dot ${online ? 'online' : 'offline'}"></div>
            <div>
                <div class="device-name">${d.name || d.deviceType}</div>
                <div class="device-type">${d.deviceType} · ID ${d.slaveId}</div>
            </div>
        </div>`;
    }).join('');
}

// ── Выбор устройства ──────────────────────────────────────────────────
async function selectDevice(deviceId, deviceType) {
    selectedDeviceId = deviceId;
    renderDeviceList();

    const main = document.getElementById('mainContent');
    main.innerHTML = '<div class="empty-state"><div class="spinner" style="border-top-color:var(--accent);border-color:var(--border)"></div><span>Загрузка...</span></div>';

    try {
        // Запрашиваем инфо об устройстве через sendTo
        console.log('deviceId:', deviceId, 'namespace:', namespace, 'shortId:', deviceId.replace(namespace + '.', ''));
        const shortId = deviceId.replace(namespace + '.', '');
        deviceInfo = await sendToAdapter('getDeviceInfo', { deviceId: shortId });
        // Подписываемся на стейты устройства
        if (!subscribed) {
            await emit('subscribe', `${namespace}.${deviceId.replace(namespace + '.', '')}.*`);
            subscribed = true;
        }

        // Читаем текущие стейты
        const stateKeys = await getDeviceStateKeys(deviceId);
        if (stateKeys.length) {
            const states = await emit('getStates', stateKeys);
            Object.assign(liveStates, states || {});
        }

        renderDevice();
    } catch (e) {
        main.innerHTML = `<div class="empty-state"><span style="color:var(--red)">${e.message}</span></div>`;
    }
}

async function getDeviceStateKeys(deviceId) {
    try {
        const suffix = deviceId.replace(namespace + '.', '');
        const result = await emit('getObjectView', 'system', 'state', {
            startkey: `${namespace}.${suffix}.`,
            endkey:   `${namespace}.${suffix}.\u9999`,
        });
        return (result.rows || []).map(r => r.id);
    } catch (_) { return []; }
}

// ── Рендер устройства ─────────────────────────────────────────────────
function renderDevice() {
    if (!deviceInfo) return;
    const d = deviceInfo;
    const online = d.connected;

    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <!-- Инфо карточка -->
        <div class="card">
            <div class="card-header">
                <div class="dot ${online ? 'online' : 'offline'}"></div>
                <span class="card-title">${d.name}</span>
                <span class="badge ${online ? 'badge-online' : 'badge-offline'}">${online ? 'Онлайн' : 'Офлайн'}</span>
            </div>
            <div class="card-body">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-key">Тип устройства</div>
                        <div class="info-val">${d.deviceType}</div>
                    </div>
                    ${d.serial ? `<div class="info-item">
                        <div class="info-key">Серийный номер</div>
                        <div class="info-val">${d.serial}</div>
                    </div>` : ''}
                    <div class="info-item">
                        <div class="info-key">Device ID</div>
                        <div class="info-val" style="font-size:11px;font-family:monospace">${d.deviceId}</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Конфигурация -->
        <div class="card" id="configCard">
            <div class="card-header">
                <span class="card-title">Конфигурация входов</span>
            </div>
            <div class="card-body">
                ${renderConfigForm(d)}
                <div style="margin-top:16px;display:flex;gap:8px">
                    <button class="btn btn-primary" onclick="applyConfig()" id="btnApply">
                        Применить
                    </button>
                    <button class="btn btn-ghost" onclick="readFromDevice()" id="btnRead">
                        Прочитать с устройства
                    </button>
                </div>
            </div>
        </div>

        <!-- Текущие значения -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Текущие значения</span>
            </div>
            <div class="card-body" style="padding:0">
                ${renderValuesTable(d)}
            </div>
        </div>
    `;
}

// ── Форма конфигурации ────────────────────────────────────────────────
function renderConfigForm(d) {
    if (!d.configParams || !d.configParams.length) {
        return '<div style="color:var(--text2)">Нет конфигурируемых параметров</div>';
    }

    const savedConfig = d.savedConfig || {};

    // Группируем параметры по входу (in1_*, in2_* и т.д.)
    const groups = {};
    for (const p of d.configParams) {
        const match = p.id.match(/^(in\d+|bus\d+)/);
        const group = match ? match[1] : 'general';
        if (!groups[group]) groups[group] = [];
        groups[group].push(p);
    }

    let html = '<div class="config-grid">';

    for (const [group, params] of Object.entries(groups)) {
        html += `<div style="border:1px solid var(--border);border-radius:6px;padding:12px">
            <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">${group.toUpperCase()}</div>`;

        for (const p of params) {
            const curVal = savedConfig[p.id] !== undefined ? savedConfig[p.id] : -1;
            html += `<div class="field" style="margin-bottom:8px">
                <div class="field-label">${p.name}</div>
                <select data-param="${p.id}" onchange="onConfigChange(this)">
                    <option value="-1" ${Number(curVal) === -1 ? 'selected' : ''}>— Неактивен —</option>
                    ${Object.entries(p.states || {}).map(([val, label]) =>
                        `<option value="${val}" ${Number(val) === Number(curVal) ? 'selected' : ''}>${label}</option>`
                    ).join('')}
                </select>
            </div>`;
        }

        // Для M1W2 в режиме 1-Wire добавляем поле количества датчиков
        const modeParam = params.find(p => p.id.match(/mode$/));
        if (modeParam) {
            const modeVal = savedConfig[modeParam.id] !== undefined ? savedConfig[modeParam.id] : 0;
            if (Number(modeVal) === 0) { // 1-Wire режим
                const sensKey = group + '_sensors';
                const sensVal = savedConfig[sensKey] || 1;
                html += `<div class="field sensors-field" data-sensors-group="${group}">
                    <input type="number" min="0" max="20" value="${sensVal}"
                        data-param="${sensKey}" style="width:64px"
                        oninput="onConfigChange(this)">
                    <label>датчиков на шине</label>
                </div>`;
            }
        }

        html += '</div>';
    }

    html += '</div>';
    return html;
}

// ── Таблица значений ──────────────────────────────────────────────────
function renderValuesTable(d) {
    // Ищем все стейты устройства
    const prefix = `${namespace}.${d.deviceId}.`;
    const stateIds = Object.keys(liveStates).filter(k =>
        k.startsWith(prefix) && !k.endsWith('.info.connection') && !k.endsWith('.config')
    );

    if (!stateIds.length) {
        return '<div style="padding:16px;color:var(--text2)">Нет данных. Настройте конфигурацию и нажмите "Применить".</div>';
    }

    let html = '<table class="values-table"><thead><tr><th>Канал</th><th>Значение</th><th>Обновлено</th></tr></thead><tbody>';

    for (const id of stateIds.sort()) {
        const state = liveStates[id];
        const name = id.replace(prefix, '').replace(/\./g, ' → ');
        html += `<tr>
            <td>${name}</td>
            <td id="val-${id.replace(/\./g, '_')}">${formatValue(state)}</td>
            <td style="color:var(--text2);font-size:11px">${state ? formatTs(state.ts) : '—'}</td>
        </tr>`;
    }

    html += '</tbody></table>';
    return html;
}

// ── Применение конфигурации ────────────────────────────────────────────
function onConfigChange(el) {
    const group = el.closest('[style*="border"]');
    if (!group) return;

    // Если изменился mode — показываем/скрываем поле sensors
    const paramId = el.dataset.param;
    if (paramId && paramId.endsWith('_mode')) {
        const groupName = paramId.replace('_mode', '');
        const sensorsField = group.querySelector(`[data-sensors-group="${groupName}"]`);
        if (sensorsField) {
            sensorsField.style.display = Number(el.value) === 0 ? 'flex' : 'none';
        }
    }
}

async function applyConfig() {
    const btn = document.getElementById('btnApply');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Применяю...';

    try {
        // Собираем конфиг из формы
        const config = {};
        document.querySelectorAll('[data-param]').forEach(el => {
            config[el.dataset.param] = Number(el.value);
        });

        // Убираем sensors для неактивных входов
        for (const key of Object.keys(config)) {
            if (key.endsWith('_sensors')) {
                const group = key.replace('_sensors', '');
                if (config[group + '_mode'] !== 0) {
                    delete config[key];
                }
            }
        }

        const shortId = selectedDeviceId.replace(namespace + '.', '');
        await sendToAdapter('applyConfig', { deviceId: shortId, config });

        deviceInfo.savedConfig = config;
        showToast('Конфигурация применена', 'success');

        setTimeout(async () => {
            const keys = await getDeviceStateKeys(selectedDeviceId);
            if (keys.length) {
                const states = await emit('getStates', keys);
                Object.assign(liveStates, states || {});
            }
            renderDevice();
        }, 1500);

    } catch (e) {
        showToast('Ошибка: ' + e.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Применить';
    }
}

async function readFromDevice() {
    const btn = document.getElementById('btnRead');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
        const shortId = selectedDeviceId.replace(namespace + '.', '');
        deviceInfo = await sendToAdapter('getDeviceInfo', { deviceId: shortId });
        renderDevice();
        showToast('Конфигурация прочитана с устройства', 'success');
    } catch (e) {
        showToast('Ошибка: ' + e.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Прочитать с устройства';
    }
}

// ── Live updates ──────────────────────────────────────────────────────
function updateLiveValue(id, state) {
    const elId = 'val-' + id.replace(/\./g, '_');
    const el = document.getElementById(elId);
    if (el) {
        el.innerHTML = formatValue(state);
    }

    // Обновляем connection dot
    if (id.endsWith('.info.connection')) {
        renderDeviceList();
        // Если это текущее устройство — обновляем бейдж
        if (selectedDeviceId && id.startsWith(selectedDeviceId)) {
            const dot = document.querySelector('.card-header .dot');
            const badge = document.querySelector('.card-header .badge');
            if (dot && badge) {
                const online = state && state.val;
                dot.className = `dot ${online ? 'online' : 'offline'}`;
                badge.className = `badge ${online ? 'badge-online' : 'badge-offline'}`;
                badge.textContent = online ? 'Онлайн' : 'Офлайн';
            }
        }
    }
}

// ── Утилиты ───────────────────────────────────────────────────────────
function formatValue(state) {
    if (!state) return '<span class="val-null">—</span>';
    const v = state.val;
    if (v === null || v === undefined) return '<span class="val-null">нет данных</span>';
    if (typeof v === 'boolean') {
        return v
            ? '<span class="val-bool-on">● Вкл</span>'
            : '<span class="val-bool-off">○ Выкл</span>';
    }
    if (typeof v === 'number') {
        return `<span class="val-number">${Math.round(v * 1000) / 1000}</span>`;
    }
    return String(v);
}

function formatTs(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function sendToAdapter(command, message) {
    return new Promise((res, rej) => {
        socket.emit('sendTo', namespace, command, message, (result) => {
            if (result && result.error) rej(new Error(result.error));
            else res(result && result.result !== undefined ? result.result : result);
        });
    });
}

let toastTimer;
function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

function showError(msg) {
    document.getElementById('mainContent').innerHTML =
        `<div class="empty-state"><span style="color:var(--red)">${msg}</span></div>`;
}

// ── Старт ─────────────────────────────────────────────────────────────
initSocket();
</script>
