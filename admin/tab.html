<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiren Board</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg:#f0f2f5; --surface:#fff; --surface2:#f8f9fb; --border:#e2e6ea;
    --accent:#1a6fc4; --accent-h:#1558a0; --text:#1a1d23; --text2:#6b7280;
    --green:#16a34a; --red:#dc2626; --radius:8px; --shadow:0 1px 3px rgba(0,0,0,.08);
}
html,body { height:auto; min-height:100vh; overflow-y:auto;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:13px; background:var(--bg); color:var(--text); line-height:1.5; }
.header { background:var(--accent); color:#fff; display:flex; align-items:center;
    padding:0 16px; height:48px; gap:10px; box-shadow:0 2px 4px rgba(0,0,0,.15);
    position:sticky; top:0; z-index:100; }
.header-title { font-size:15px; font-weight:600; flex:1; }
.header-status { font-size:12px; opacity:.75; }
.layout { display:grid; grid-template-columns:260px 1fr; min-height:calc(100vh - 48px); }
.panel { border-right:1px solid var(--border); background:var(--surface); display:flex; flex-direction:column; }
.panel-header { padding:10px 12px; border-bottom:1px solid var(--border); background:var(--surface2);
    display:flex; align-items:center; gap:8px; }
.panel-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text2); flex:1; }
.panel-body { flex:1; overflow-y:auto; padding:8px 0; }
.list-item { display:flex; align-items:center; gap:8px; padding:8px 12px; cursor:pointer; transition:background .1s; }
.list-item:hover { background:var(--surface2); }
.list-item.active { background:#e8f0fb; }
.list-item.active .item-name { color:var(--accent); font-weight:600; }
.item-name { font-size:13px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.item-sub  { font-size:11px; color:var(--text2); margin-top:1px; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot.online  { background:var(--green); box-shadow:0 0 0 2px #dcfce7; }
.dot.offline { background:var(--red);   box-shadow:0 0 0 2px #fee2e2; }
.dot.unknown { background:#d1d5db; }
.gw-header { padding:6px 12px 2px; font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.08em; color:var(--text2); background:var(--surface2);
    border-bottom:1px solid var(--border); margin-top:4px; }
.gw-header:first-child { margin-top:0; }
.main { padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
.card-header { padding:10px 14px; border-bottom:1px solid var(--border); background:var(--surface2);
    display:flex; align-items:center; gap:8px; }
.card-title { font-size:13px; font-weight:600; flex:1; }
.card-body  { padding:14px; }
.form-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.form-row:last-child { margin-bottom:0; }
.form-label { font-size:12px; color:var(--text2); width:130px; flex-shrink:0; }
.form-row input,.form-row select { flex:1; padding:6px 10px; border:1px solid var(--border);
    border-radius:6px; font-size:13px; background:var(--surface); color:var(--text); outline:none; }
.form-row input:focus,.form-row select:focus { border-color:var(--accent); }
.form-row input[type=checkbox] { flex:none; width:16px; height:16px; }
.btn { display:inline-flex; align-items:center; gap:5px; padding:6px 14px; border:none;
    border-radius:6px; font-size:12px; font-weight:500; cursor:pointer;
    transition:background .12s,opacity .12s; white-space:nowrap; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover:not(:disabled) { background:var(--accent-h); }
.btn-danger  { background:var(--red); color:#fff; }
.btn-danger:hover:not(:disabled)  { background:#b91c1c; }
.btn-ghost   { background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover:not(:disabled)   { background:var(--surface2); }
.btn-sm { padding:4px 10px; font-size:12px; }
.btn-icon { padding:4px 8px; }
.btn-group { display:flex; gap:6px; flex-wrap:wrap; }
.ch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-bottom:12px; }
.ch-card { border:1px solid var(--border); border-radius:6px; padding:10px; background:var(--surface); }
.ch-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text2); margin-bottom:8px; }
.ch-field { margin-bottom:6px; }
.ch-field:last-child { margin-bottom:0; }
.ch-label { font-size:11px; color:var(--text2); margin-bottom:2px; }
.ch-select,.ch-input { width:100%; padding:5px 8px; border:1px solid var(--border);
    border-radius:5px; font-size:12px; background:var(--surface); color:var(--text); outline:none; }
.ch-select:focus,.ch-input:focus { border-color:var(--accent); }
.relay-btn { width:100%; padding:8px; border:none; border-radius:6px; font-size:13px;
    font-weight:600; cursor:pointer; transition:background .15s; margin-top:4px; }
.relay-btn.on  { background:#dcfce7; color:#15803d; }
.relay-btn.off { background:#f1f5f9; color:var(--text2); }
.relay-btn:hover { opacity:.85; }
.mval-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.mval-chip { background:var(--surface2); border:1px solid var(--border); border-radius:4px;
    padding:2px 7px; font-size:11px; }
.mval-chip .mn { color:var(--text2); }
.mval-chip .mv { color:var(--accent); font-weight:600; }
.section-label { font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.05em; color:var(--text2); margin-bottom:8px; }
.info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
.info-key { font-size:11px; color:var(--text2); }
.info-val { font-size:13px; font-weight:500; margin-top:1px; }
.scan-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); }
.scan-item:last-child { border-bottom:none; }
.scan-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-known   { background:#dcfce7; color:#15803d; }
.badge-unknown { background:#fef3c7; color:#92400e; }
.badge-exists  { background:#e0e7ff; color:#3730a3; }
.progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin:8px 0; }
.progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }
.toast { position:fixed; bottom:20px; right:20px; padding:10px 16px; border-radius:6px;
    font-size:13px; color:#fff; background:#1a1d23; opacity:0; transform:translateY(8px);
    transition:opacity .2s,transform .2s; z-index:1000; pointer-events:none; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.success { background:var(--green); }
.toast.error   { background:var(--red); }
.spinner { width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { padding:24px; text-align:center; color:var(--text2); font-size:12px; }
</style>
</head>
<body>

<div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    <span class="header-title">Wiren Board RS485</span>
    <span class="header-status" id="headerStatus">Подключение...</span>
</div>

<div class="layout">
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Устройства</span>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="showSettings()" title="Настройки">⚙</button>
        </div>
        <div class="panel-body" id="deviceList"><div class="empty">Загрузка...</div></div>
    </div>
    <div class="main" id="mainContent">
        <div class="empty" style="margin-top:40px">Выберите устройство</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const NS = 'wirenboard.0';
let socket = null;
let adapterConfig = { gateways: [], devices: [] };
let selectedDeviceId = null, deviceInfo = null;
let liveStates = {}, subscriptions = new Set();
let DEVICE_TYPES = [], SIG_MAP = {};

// ─── Socket ───────────────────────────────────────────────────────────────────
function initSocket() {
    const s = document.createElement('script');
    s.src = '/socket.io/socket.io.js';
    s.onload = connectSocket;
    s.onerror = () => setStatus('Ошибка socket.io');
    document.head.appendChild(s);
}

function connectSocket() {
    const l = window.location;
    socket = io.connect(l.protocol + '//' + l.hostname + ':' + (l.port || 8081));
    socket.on('connect',     () => { setStatus('Подключено'); loadAll(); });
    socket.on('disconnect',  () => setStatus('Нет связи'));
    socket.on('stateChange', (id, state) => {
        if (!id.startsWith(NS)) return;
        liveStates[id] = state;
        onLiveStateChange(id, state);
    });
}

function emit(cmd, ...args) {
    return new Promise((res, rej) =>
        socket.emit(cmd, ...args, (err, r) => err ? rej(new Error(err)) : res(r))
    );
}

function sendTo(command, message) {
    return new Promise((res, rej) =>
        socket.emit('sendTo', NS, command, message, r => {
            if (r && r.error) rej(new Error(r.error));
            else res(r && r.result !== undefined ? r.result : r);
        })
    );
}

// ─── Загрузка ─────────────────────────────────────────────────────────────────
async function loadAll() {
    try {
        const templates = await sendTo('getTemplates', {});
        DEVICE_TYPES = (templates || []).map(t => t.deviceType).sort();
        SIG_MAP = {};
        for (const t of (templates || []))
            for (const s of (t.signatures || [])) SIG_MAP[s] = t.deviceType;

        const cfg = await sendTo('getConfig', {});
        adapterConfig = cfg || { gateways: [], devices: [] };

        await emit('subscribe', NS + '.*.info.connection');
        const objs = await emit('getObjectView', 'system', 'state',
            { startkey: NS + '.', endkey: NS + '.香' });
        const ck = (objs?.rows || []).map(r => r.id).filter(id => id.endsWith('.info.connection'));
        if (ck.length) { const st = await emit('getStates', ck); Object.assign(liveStates, st || {}); }

        renderDeviceList();
        setStatus((adapterConfig.devices || []).length + ' устройств');
    } catch (e) { setStatus('Ошибка: ' + e.message); }
}

// ─── Список устройств ─────────────────────────────────────────────────────────
function makeDevId(gw, d) {
    return (gw.name || 'gw').replace(/[^a-zA-Z0-9_]/g, '_') + '_' +
           (d.name || d.deviceType + '_' + d.slaveId).replace(/[^a-zA-Z0-9_]/g, '_');
}

function devOnline(devId) { return liveStates[NS + '.' + devId + '.info.connection']?.val; }

function renderDeviceList() {
    const list = document.getElementById('deviceList');
    const gws  = adapterConfig.gateways || [];
    const devs = adapterConfig.devices  || [];
    if (!devs.length) {
        list.innerHTML = '<div class="empty">Нет устройств.<br><button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="showSettings()">Настроить</button></div>';
        return;
    }
    let html = '';
    for (const gw of gws) {
        const gwDevs = devs.filter(d => d.gateway === gw.name && d.enabled !== false);
        if (!gwDevs.length) continue;
        html += '<div class="gw-header">' + esc(gw.name) + '</div>';
        for (const d of gwDevs) {
            const devId = makeDevId(gw, d);
            const online = devOnline(devId);
            html += '<div class="list-item ' + (selectedDeviceId === devId ? 'active' : '') +
                '" onclick="selectDevice(\'' + devId + '\')">' +
                '<div class="dot ' + (d.enabled === false ? 'unknown' : online ? 'online' : 'offline') + '"></div>' +
                '<div style="flex:1;min-width:0">' +
                '<div class="item-name">' + esc(d.name) + '</div>' +
                '<div class="item-sub">' + esc(d.deviceType) + ' · ID ' + d.slaveId + '</div>' +
                '</div>' +
                '<button class="btn btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();showDeviceForm(\'' + devId + '\')">✎</button>' +
                '</div>';
        }
    }
    if (gws.length) {
        html += '<div style="padding:8px 12px;border-top:1px solid var(--border);margin-top:4px">' +
            '<button class="btn btn-ghost btn-sm" style="width:100%" onclick="showScanPicker()">🔍 Сканировать шину</button></div>';
    }
    list.innerHTML = html;
}

// ─── Панель устройства ────────────────────────────────────────────────────────
async function selectDevice(devId) {
    selectedDeviceId = devId;
    renderDeviceList();
    showSpinner();
    try {
        deviceInfo = await sendTo('getDeviceInfo', { deviceId: devId });
        if (!subscriptions.has(devId)) {
            await emit('subscribe', NS + '.' + devId + '.*');
            subscriptions.add(devId);
        }
        const res  = await emit('getObjectView', 'system', 'state',
            { startkey: NS + '.' + devId + '.', endkey: NS + '.' + devId + '.香' });
        const keys = (res?.rows || []).map(r => r.id);
        if (keys.length) { const st = await emit('getStates', keys); Object.assign(liveStates, st || {}); }
        renderDevicePanel();
    } catch (e) {
        document.getElementById('mainContent').innerHTML =
            '<div class="empty" style="color:var(--red)">' + esc(e.message) + '</div>';
    }
}

function renderDevicePanel() {
    if (!deviceInfo) return;
    const d      = deviceInfo;
    const online = devOnline(d.deviceId);
    const isNew  = !d.savedConfig || !Object.keys(d.savedConfig.flat || {}).length;

    document.getElementById('mainContent').innerHTML =
        // ── Шапка устройства ──
        '<div class="card"><div class="card-header">' +
        '<div class="dot ' + (online ? 'online' : 'offline') + '"></div>' +
        '<span class="card-title">' + esc(d.name) + '</span>' +
        '<span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;' +
            'background:' + (online ? '#dcfce7' : '#fee2e2') + ';color:' + (online ? '#15803d' : '#b91c1c') + '">' +
            (online ? 'Онлайн' : 'Офлайн') + '</span>' +
        '<button class="btn btn-ghost btn-sm" onclick="restartAdapter()" style="margin-left:auto">↻ Перезапустить</button>' +
        '</div><div class="card-body">' +
        '<div class="info-grid">' +
        '<div><div class="info-key">Тип</div><div class="info-val">' + esc(d.deviceType) + '</div></div>' +
        (d.serial ? '<div><div class="info-key">Серийный номер</div><div class="info-val">' + d.serial + '</div></div>' : '') +
        (d.info && d.info.fw_version ? '<div><div class="info-key">Прошивка</div><div class="info-val">' + esc(String(d.info.fw_version)) + '</div></div>' : '') +
        '</div></div></div>' +

        // ── Форма конфигурации ──
        '<div class="card"><div class="card-header">' +
        '<span class="card-title">Конфигурация</span>' +
        (isNew ? '<span style="font-size:11px;color:var(--text2);margin-left:4px">· новое устройство</span>' : '') +
        '</div>' +
        '<div class="card-body" id="configFormBody">' + renderConfigForm(d) + '</div></div>';
}

// ─── Форма конфигурации ───────────────────────────────────────────────────────
function renderConfigForm(d) {
    const allChannels  = d.channels     || [];
    const configParams = d.configParams || [];   // flat-регистры (режимы)
    const sc           = d.savedConfig  || {};
    const flat         = sc.flat        || {};
    const settings     = sc.settings    || {};

    const flatIds = new Set(configParams.map(s => s.id));
    let html = '';

    // ── 1. Реле / команды ─────────────────────────────────────────────────────
    const relayChs = allChannels.filter(ch =>
        (ch.measurements || []).some(m => m.writable)
    );
    if (relayChs.length) {
        html += '<div class="section-label">Управление выходами</div>';
        html += '<div class="ch-grid">';
        for (const ch of relayChs) {
            html += '<div class="ch-card"><div class="ch-title">' + esc(ch.name) + '</div>';
            for (const m of (ch.measurements || []).filter(m => m.writable)) {
                const stateId = NS + '.' + d.deviceId + '.' + ch.id + '.' + m.id;
                const val     = liveStates[stateId]?.val;
                const isOn    = val === true || val === 1;
                const label   = val === null || val === undefined ? '? Неизвестно'
                    : isOn ? '● Включено' : '○ Выключено';
                html += '<button class="relay-btn ' + (isOn ? 'on' : 'off') + '"' +
                    ' onclick="toggleRelay(\'' + stateId + '\',' + (isOn ? 'false' : 'true') + ')">' +
                    label + '</button>';
            }
            html += '</div>';
        }
        html += '</div>';
    }

    // ── 2. Режимы входов (flat configParams) ──────────────────────────────────
    if (configParams.length) {
        html += '<div class="section-label" style="margin-top:4px">Режимы входов</div>';
        html += '<div class="ch-grid">';

        // Группируем по каналу: берём имя канала из allChannels
        // configParam.id например in0_mode → ищем канал in0
        // или in1P_type → канал in1P
        const paramsByChannel = {};
        for (const p of configParams) {
            // Находим канал которому принадлежит этот параметр
            const ch = allChannels.find(ch =>
                ch.settings && ch.settings.some(s => s.id === p.id)
            );
            const chId = ch ? ch.id : '_other';
            const chName = ch ? ch.name : 'Прочее';
            if (!paramsByChannel[chId]) paramsByChannel[chId] = { name: chName, params: [] };
            paramsByChannel[chId].params.push(p);
        }

        for (const [chId, group] of Object.entries(paramsByChannel)) {
            // Текущие значения измерений этого канала
            const ch      = allChannels.find(c => c.id === chId);
            const msrVals = _channelMeasurementChips(d.deviceId, ch);

            html += '<div class="ch-card"><div class="ch-title">' + esc(group.name) + '</div>';

            for (const p of group.params) {
                const cur  = flat[p.id] !== undefined ? Number(flat[p.id]) : -1;
                const opts = Object.entries(p.states || {}).map(([v, l]) =>
                    '<option value="' + v + '"' + (Number(v) === cur ? ' selected' : '') + '>' + esc(l) + '</option>'
                ).join('');
                html += '<div class="ch-field">' +
                    '<div class="ch-label">' + esc(p.name) + '</div>' +
                    '<select class="ch-select" data-flat="' + p.id + '" onchange="onFlatChange(this)">' +
                    '<option value="-1"' + (cur === -1 ? ' selected' : '') + '>— не задано —</option>' +
                    opts + '</select>' +
                    '</div>';
            }

            // Поле количества датчиков 1-Wire — ищем adapter_* настройку в этом канале
            if (ch) {
                const adapterSettings = (ch.settings || []).filter(s => s.id.startsWith('adapter_'));
                for (const as of adapterSettings) {
                    const cur = flat[as.id] !== undefined ? flat[as.id] : (as.def || 1);
                    html += '<div class="ch-field">' +
                        '<div class="ch-label">' + esc(as.name) + '</div>' +
                        '<input type="number" class="ch-input" min="' + (as.min || 1) + '" max="' + (as.max || 10) + '"' +
                        ' value="' + cur + '" data-flat="' + as.id + '" onchange="onFlatChange(this)">' +
                        '</div>';
                }
            }

            // Показываем текущие значения измерений под настройками
            if (msrVals) html += msrVals;

            html += '</div>'; // ch-card
        }
        html += '</div>'; // ch-grid
    }

    // ── 3. Прочие rw-настройки (не flat, не relay) ────────────────────────────
    const settingsChs = allChannels.filter(ch => {
        const nonFlat = (ch.settings || []).filter(s => !flatIds.has(s.id) && !s.id.startsWith('adapter_'));
        return nonFlat.length > 0;
    });
    if (settingsChs.length) {
        html += '<div class="section-label" style="margin-top:4px">Настройки каналов</div>';
        html += '<div class="ch-grid">';
        for (const ch of settingsChs) {
            const chCfg  = settings[ch.id] || {};
            const rwSets = (ch.settings || []).filter(s => !flatIds.has(s.id) && !s.id.startsWith('adapter_'));
            html += '<div class="ch-card"><div class="ch-title">' + esc(ch.name) + '</div>';
            for (const s of rwSets) {
                const cur    = chCfg[s.id] !== undefined ? chCfg[s.id] : (s.default != null ? s.default : 0);
                const locked = s.write === false;
                html += '<div class="ch-field"><div class="ch-label">' + esc(s.name) + '</div>';
                if (s.states && Object.keys(s.states).length) {
                    const opts = Object.entries(s.states).map(([v, l]) =>
                        '<option value="' + v + '"' + (Number(v) === Number(cur) ? ' selected' : '') + '>' + esc(l) + '</option>'
                    ).join('');
                    html += '<select class="ch-select" data-ch="' + ch.id + '" data-setting="' + s.id + '"' +
                        (locked ? ' disabled' : '') + '>' + opts + '</select>';
                } else {
                    html += '<input type="number" class="ch-input"' +
                        (s.min != null ? ' min="' + s.min + '"' : '') +
                        (s.max != null ? ' max="' + s.max + '"' : '') +
                        ' value="' + cur + '" data-ch="' + ch.id + '" data-setting="' + s.id + '"' +
                        (locked ? ' disabled' : '') + '>';
                }
                html += '</div>';
            }
            html += '</div>';
        }
        html += '</div>';
    }

    if (!relayChs.length && !configParams.length && !settingsChs.length) {
        html = '<div style="color:var(--text2);margin-bottom:12px">Нет настраиваемых параметров.<br>' +
            'Нажмите «Прочитать с устройства» чтобы загрузить текущую конфигурацию.</div>';
    }

    // ── Кнопки действий ───────────────────────────────────────────────────────
    html += '<div class="btn-group" style="margin-top:12px">' +
        '<button class="btn btn-primary" onclick="applyConfig()" id="btnApply">Применить</button>' +
        '<button class="btn btn-ghost"   onclick="readFromDevice()" id="btnRead">Прочитать с устройства</button>' +
        '</div>';

    return html;
}

// Возвращает HTML чипов с текущими значениями измерений канала
function _channelMeasurementChips(deviceId, ch) {
    if (!ch) return '';
    const msrs = (ch.measurements || []).filter(m => !m.writable);
    if (!msrs.length) return '';
    const chips = msrs.map(m => {
        const stateId = NS + '.' + deviceId + '.' + ch.id + '.' + m.id;
        const s = liveStates[stateId];
        if (!s || s.val === null || s.val === undefined) return '';
        return '<div class="mval-chip"><span class="mn">' + esc(m.name) + '&nbsp;</span>' +
            '<span class="mv">' + fmtVal(s) + '</span></div>';
    }).filter(Boolean);
    if (!chips.length) return '';
    return '<div class="mval-row">' + chips.join('') + '</div>';
}

// ─── Управление реле ──────────────────────────────────────────────────────────
async function toggleRelay(stateId, newVal) {
    try {
        await emit('setState', stateId, newVal === 'true' || newVal === true, false);
        // Оптимистичное обновление UI
        if (!liveStates[stateId]) liveStates[stateId] = {};
        liveStates[stateId].val = newVal === 'true' || newVal === true;
        rerenderConfigForm();
    } catch (e) {
        showToast('Ошибка: ' + e.message, 'error');
    }
}

// ─── Flat change ──────────────────────────────────────────────────────────────
function onFlatChange(el) {
    if (!deviceInfo) return;
    if (!deviceInfo.savedConfig) deviceInfo.savedConfig = {};
    if (!deviceInfo.savedConfig.flat) deviceInfo.savedConfig.flat = {};
    deviceInfo.savedConfig.flat[el.dataset.flat] = Number(el.value);
    rerenderConfigForm();
}

function rerenderConfigForm() {
    const body = document.getElementById('configFormBody');
    if (!body || !deviceInfo) return;
    body.innerHTML = renderConfigForm(deviceInfo);
}

// ─── Сбор и применение конфига ────────────────────────────────────────────────
function collectConfig() {
    const flat = {}, settings = {};
    document.querySelectorAll('[data-flat]').forEach(el => {
        const v = Number(el.value);
        if (!isNaN(v) && v !== -1) flat[el.dataset.flat] = v;
    });
    document.querySelectorAll('[data-ch][data-setting]').forEach(el => {
        if (el.disabled) return;
        const chId = el.dataset.ch, sId = el.dataset.setting;
        if (!settings[chId]) settings[chId] = {};
        settings[chId][sId] = Number(el.value);
    });
    return { flat, sensors: {}, settings };
}

async function applyConfig() {
    const btn = document.getElementById('btnApply');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Применяю...';
    try {
        const config = collectConfig();
        await sendTo('applyConfig', { deviceId: selectedDeviceId, config });
        // Сброс старых стейтов измерений
        const prefix = NS + '.' + selectedDeviceId + '.';
        for (const k of Object.keys(liveStates))
            if (k.startsWith(prefix) && !k.startsWith(prefix + 'info.')) delete liveStates[k];
        // Перезагружаем deviceInfo и стейты
        deviceInfo = await sendTo('getDeviceInfo', { deviceId: selectedDeviceId });
        showToast('Конфигурация применена', 'success');
        setTimeout(async () => {
            const r = await emit('getObjectView', 'system', 'state',
                { startkey: NS + '.' + selectedDeviceId + '.', endkey: NS + '.' + selectedDeviceId + '.香' });
            const ks = (r?.rows || []).map(x => x.id);
            if (ks.length) { const st = await emit('getStates', ks); Object.assign(liveStates, st || {}); }
            renderDevicePanel();
        }, 1500);
    } catch (e) {
        showToast('Ошибка: ' + e.message, 'error');
    } finally {
        btn.disabled = false; btn.innerHTML = 'Применить';
    }
}

async function readFromDevice() {
    const btn = document.getElementById('btnRead');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try {
        // Читаем holding-регистры с железа через новую команду
        await sendTo('readConfigFromDevice', { deviceId: selectedDeviceId });
        deviceInfo = await sendTo('getDeviceInfo', { deviceId: selectedDeviceId });
        renderDevicePanel();
        showToast('Прочитано с устройства', 'success');
    } catch (e) {
        showToast('Ошибка: ' + e.message, 'error');
    } finally {
        btn.disabled = false; btn.innerHTML = 'Прочитать с устройства';
    }
}

// ─── Настройки (шлюзы и устройства) ──────────────────────────────────────────
function showSettings() {
    document.getElementById('mainContent').innerHTML =
        '<div class="card"><div class="card-header"><span class="card-title">Шлюзы</span>' +
        '<button class="btn btn-primary btn-sm" onclick="showGatewayForm(null)">+ Добавить</button></div>' +
        '<div class="card-body">' + renderGatewayTable() + '</div></div>' +
        '<div class="card"><div class="card-header"><span class="card-title">Устройства</span>' +
        '<button class="btn btn-primary btn-sm" onclick="showDeviceForm(null)">+ Добавить</button></div>' +
        '<div class="card-body">' + renderDeviceTable() + '</div></div>';
}

function renderGatewayTable() {
    const gws = adapterConfig.gateways || [];
    if (!gws.length) return '<div style="color:var(--text2)">Нет шлюзов</div>';
    return gws.map(gw => {
        const nm = gw.name.replace(/'/g, "\\'");
        return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">' +
            '<div style="flex:1"><b>' + esc(gw.name) + '</b> <span style="color:var(--text2);font-size:11px">' + esc(gw.host) + ':' + gw.port + '</span></div>' +
            '<button class="btn btn-ghost btn-sm" onclick="showGatewayForm(\'' + nm + '\')">✎</button>' +
            '</div>';
    }).join('');
}

function renderDeviceTable() {
    const devs = adapterConfig.devices || [];
    if (!devs.length) return '<div style="color:var(--text2)">Нет устройств</div>';
    return devs.map(d => {
        const gw    = (adapterConfig.gateways || []).find(g => g.name === d.gateway) || { name: d.gateway };
        const devId = makeDevId(gw, d);
        return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">' +
            '<div style="flex:1"><b>' + esc(d.name) + '</b> <span style="color:var(--text2);font-size:11px">' +
            esc(d.deviceType) + ' · ' + esc(d.gateway) + ' · ID ' + d.slaveId + '</span></div>' +
            '<button class="btn btn-ghost btn-sm" onclick="showDeviceForm(\'' + devId + '\')">✎</button>' +
            '</div>';
    }).join('');
}

function showGatewayForm(gwName) {
    const gw = gwName ? (adapterConfig.gateways || []).find(g => g.name === gwName) : null;
    document.getElementById('mainContent').innerHTML =
        '<div class="card"><div class="card-header"><span class="card-title">' + (gw ? 'Редактировать шлюз' : 'Новый шлюз') + '</span></div>' +
        '<div class="card-body">' +
        '<div class="form-row"><span class="form-label">Название</span><input id="gw_name" value="' + (gw ? esc(gw.name) : '') + '"></div>' +
        '<div class="form-row"><span class="form-label">IP адрес</span><input id="gw_host" value="' + (gw ? esc(gw.host) : '') + '"></div>' +
        '<div class="form-row"><span class="form-label">TCP порт</span><input id="gw_port" type="number" value="' + (gw ? gw.port : 23) + '"></div>' +
        '<div class="form-row"><span class="form-label">Интервал опроса (мс)</span><input id="gw_poll" type="number" value="' + (gw ? (gw.pollInterval || 10000) : 10000) + '"></div>' +
        '<div class="form-row"><span class="form-label">Активен</span><input id="gw_enabled" type="checkbox" ' + (gw && gw.enabled === false ? '' : 'checked') + '></div>' +
        '<div class="btn-group" style="margin-top:12px">' +
        '<button class="btn btn-primary" onclick="saveGateway(\'' + (gwName || '').replace(/'/g,"\\'") + '\')">Сохранить</button>' +
        (gw ? '<button class="btn btn-danger" onclick="deleteGateway(\'' + (gwName).replace(/'/g,"\\'") + '\')">Удалить</button>' : '') +
        '<button class="btn btn-ghost" onclick="showSettings()">Отмена</button>' +
        '</div></div></div>';
}

async function saveGateway(oldName) {
    const name    = document.getElementById('gw_name').value.trim();
    const host    = document.getElementById('gw_host').value.trim();
    const port    = parseInt(document.getElementById('gw_port').value);
    const poll    = parseInt(document.getElementById('gw_poll').value);
    const enabled = document.getElementById('gw_enabled').checked;
    if (!name || !host) { showToast('Заполните название и IP', 'error'); return; }
    const gws = adapterConfig.gateways || (adapterConfig.gateways = []);
    const idx = oldName ? gws.findIndex(g => g.name === oldName) : -1;
    const newGw = { name, host, port, pollInterval: poll, enabled };
    if (idx >= 0) {
        gws[idx] = newGw;
        if (oldName !== name) (adapterConfig.devices || []).forEach(d => { if (d.gateway === oldName) d.gateway = name; });
    } else gws.push(newGw);
    await persistConfig(); renderDeviceList(); showSettings();
    showToast('Шлюз сохранён. Перезапустите адаптер.', 'success');
}

async function deleteGateway(name) {
    if (!confirm('Удалить шлюз "' + name + '"?')) return;
    adapterConfig.gateways = (adapterConfig.gateways || []).filter(g => g.name !== name);
    adapterConfig.devices  = (adapterConfig.devices  || []).filter(d => d.gateway !== name);
    await persistConfig(); renderDeviceList(); showSettings();
}

function showDeviceForm(devId) {
    const gws = adapterConfig.gateways || [];
    let dev = null;
    if (devId) {
        for (const gw of gws) {
            dev = (adapterConfig.devices || []).find(d => makeDevId(gw, d) === devId);
            if (dev) break;
        }
    }
    const gwOpts   = gws.map(g =>
        '<option value="' + esc(g.name) + '"' + (dev && dev.gateway === g.name ? ' selected' : '') + '>' + esc(g.name) + '</option>'
    ).join('');
    const typeOpts = DEVICE_TYPES.map(t =>
        '<option value="' + esc(t) + '"' + (dev && dev.deviceType === t ? ' selected' : '') + '>' + esc(t) + '</option>'
    ).join('');
    document.getElementById('mainContent').innerHTML =
        '<div class="card"><div class="card-header"><span class="card-title">' + (dev ? 'Редактировать устройство' : 'Новое устройство') + '</span></div>' +
        '<div class="card-body">' +
        '<div class="form-row"><span class="form-label">Название</span><input id="dev_name" value="' + (dev ? esc(dev.name) : '') + '"></div>' +
        '<div class="form-row"><span class="form-label">Шлюз</span><select id="dev_gw">' + gwOpts + '</select></div>' +
        '<div class="form-row"><span class="form-label">Slave ID</span><input id="dev_slave" type="number" value="' + (dev ? dev.slaveId : 1) + '" min="1" max="247"></div>' +
        '<div class="form-row"><span class="form-label">Тип устройства</span><select id="dev_type">' + typeOpts + '</select></div>' +
        '<div class="form-row"><span class="form-label">Активно</span><input id="dev_enabled" type="checkbox" ' + (dev && dev.enabled === false ? '' : 'checked') + '></div>' +
        '<div class="btn-group" style="margin-top:12px">' +
        '<button class="btn btn-primary" onclick="saveDevice(\'' + (devId || '').replace(/'/g,"\\'") + '\')">Сохранить</button>' +
        (dev ? '<button class="btn btn-danger" onclick="deleteDevice(\'' + (devId).replace(/'/g,"\\'") + '\')">Удалить</button>' : '') +
        '<button class="btn btn-ghost" onclick="showSettings()">Отмена</button>' +
        '</div></div></div>';
}

async function saveDevice(oldDevId) {
    const name    = document.getElementById('dev_name').value.trim();
    const gateway = document.getElementById('dev_gw').value;
    const slaveId = parseInt(document.getElementById('dev_slave').value);
    const type    = document.getElementById('dev_type').value;
    const enabled = document.getElementById('dev_enabled').checked;
    if (!name) { showToast('Введите название', 'error'); return; }
    const devs   = adapterConfig.devices || (adapterConfig.devices = []);
    const newDev = { name, gateway, slaveId, deviceType: type, enabled };
    if (oldDevId) {
        let found = false;
        for (const g of (adapterConfig.gateways || [])) {
            const idx = devs.findIndex(d => makeDevId(g, d) === oldDevId);
            if (idx >= 0) { devs[idx] = newDev; found = true; break; }
        }
        if (!found) devs.push(newDev);
    } else devs.push(newDev);
    await persistConfig(); renderDeviceList(); showSettings();
    showToast('Сохранено. Перезапустите адаптер.', 'success');
}

async function deleteDevice(devId) {
    if (!confirm('Удалить устройство?')) return;
    adapterConfig.devices = (adapterConfig.devices || []).filter(d =>
        !(adapterConfig.gateways || []).some(g => makeDevId(g, d) === devId)
    );
    if (selectedDeviceId === devId) selectedDeviceId = null;
    await persistConfig(); renderDeviceList(); showSettings();
}

// ─── Сканирование ─────────────────────────────────────────────────────────────
function showScanPicker() {
    const gws = adapterConfig.gateways || [];
    if (!gws.length) { showToast('Нет шлюзов', 'error'); return; }
    if (gws.length === 1) { startScan(gws[0]); return; }
    const btns = gws.map(gw =>
        '<button class="btn btn-ghost" onclick="startScan(adapterConfig.gateways.find(g=>g.name===\'' +
        gw.name.replace(/'/g,"\\'") + '\'))">' + esc(gw.name) + '</button>'
    ).join('');
    document.getElementById('mainContent').innerHTML =
        '<div class="card"><div class="card-header"><span class="card-title">Выберите шлюз</span></div>' +
        '<div class="card-body"><div class="btn-group">' + btns + '</div></div></div>';
}

function startScan(gw) {
    document.getElementById('mainContent').innerHTML =
        '<div class="card"><div class="card-header"><span class="card-title">🔍 Сканирование: ' + esc(gw.name) + '</span></div>' +
        '<div class="card-body">' +
        '<div class="form-row">' +
        '<span class="form-label">Диапазон адресов</span>' +
        '<input id="scan_from" type="number" value="1"   min="1" max="247" style="width:70px;flex:none">' +
        '<span style="color:var(--text2)">—</span>' +
        '<input id="scan_to"   type="number" value="247" min="1" max="247" style="width:70px;flex:none">' +
        '<button class="btn btn-primary btn-sm" onclick="runScan(\'' + gw.name.replace(/'/g,"\\'") + '\',\'' + gw.host + '\',' + gw.port + ')">Начать</button>' +
        '</div>' +
        '<div class="progress-bar" id="scanProgress" style="display:none"><div class="progress-fill" id="scanFill" style="width:0%"></div></div>' +
        '<div id="scanStatus" style="font-size:12px;color:var(--text2);margin:6px 0"></div>' +
        '<div id="scanResults"></div>' +
        '</div></div>';
}

async function runScan(gwName, host, port) {
    const from = parseInt(document.getElementById('scan_from').value);
    const to   = parseInt(document.getElementById('scan_to').value);
    const total = to - from + 1;
    document.getElementById('scanProgress').style.display = '';
    document.getElementById('scanFill').style.width = '0%';
    document.getElementById('scanStatus').textContent = 'Сканирование 0/' + total + '...';
    document.getElementById('scanResults').innerHTML = '';

    const estMs = total * 150, startTs = Date.now();
    const progTimer = setInterval(() => {
        const pct  = Math.min(95, Math.round((Date.now() - startTs) / estMs * 100));
        document.getElementById('scanFill').style.width = pct + '%';
        document.getElementById('scanStatus').textContent = 'Сканирование ' + Math.round(pct * total / 100) + '/' + total + '...';
    }, 300);

    try {
        const found = await sendTo('scan', { host, port, from, to });
        clearInterval(progTimer);
        document.getElementById('scanFill').style.width = '100%';
        document.getElementById('scanStatus').textContent = 'Готово. Найдено: ' + (found ? found.length : 0);
        const exists = (adapterConfig.devices || []).filter(d => d.gateway === gwName).map(d => d.slaveId);
        renderScanResults(found || [], exists, gwName);
    } catch (e) {
        clearInterval(progTimer);
        document.getElementById('scanStatus').textContent = 'Ошибка: ' + e.message;
    }
}

function renderScanResults(found, exists, gwName) {
    const el = document.getElementById('scanResults');
    if (!found.length) { el.innerHTML = ''; return; }
    el.innerHTML = '<div style="margin-top:10px;border:1px solid var(--border);border-radius:6px;overflow:hidden">' +
        found.map(f => {
            const dt = SIG_MAP[f.signature];
            const ex = exists.includes(f.slaveId);
            return '<div class="scan-item">' +
                '<div style="font-family:monospace;font-size:12px;width:30px;color:var(--text2)">' + f.slaveId + '</div>' +
                '<div style="flex:1"><div style="font-size:13px;font-weight:500">' + esc(dt || f.signature) + '</div>' +
                '<div style="font-size:11px;color:var(--text2)">' + esc(f.signature) + '</div></div>' +
                '<span class="scan-badge ' + (ex ? 'badge-exists' : dt ? 'badge-known' : 'badge-unknown') + '">' +
                (ex ? 'Добавлено' : dt ? 'Поддерживается' : 'Неизвестен') + '</span>' +
                (!ex && dt ? '<button class="btn btn-primary btn-sm" onclick="addFound(\'' +
                    gwName.replace(/'/g,"\\'") + '\',' + f.slaveId + ',\'' + dt + '\')">+ Добавить</button>' : '') +
                '</div>';
        }).join('') + '</div>';
}

async function addFound(gwName, slaveId, devType) {
    const name = prompt('Название устройства:', devType + '_' + slaveId);
    if (!name) return;
    (adapterConfig.devices || (adapterConfig.devices = [])).push(
        { name, gateway: gwName, slaveId, deviceType: devType, enabled: true }
    );
    await persistConfig(); renderDeviceList();
    showToast('Добавлено. Перезапустите адаптер.', 'success');
}

// ─── Утилиты ──────────────────────────────────────────────────────────────────
async function restartAdapter() {
    if (!confirm('Перезапустить адаптер?')) return;
    try { await sendTo('restart', {}); showToast('Перезапуск...', 'success'); setTimeout(() => loadAll(), 4000); }
    catch (e) { showToast('Ошибка: ' + e.message, 'error'); }
}

let _reRenderTimer = null;
function onLiveStateChange(id, state) {
    if (id.endsWith('.info.connection')) { renderDeviceList(); return; }
    if (deviceInfo && id.startsWith(NS + '.' + deviceInfo.deviceId + '.')) {
        clearTimeout(_reRenderTimer);
        _reRenderTimer = setTimeout(() => rerenderConfigForm(), 300);
    }
}

async function persistConfig() {
    await sendTo('saveConfig', { gateways: adapterConfig.gateways, devices: adapterConfig.devices });
}

function fmtVal(s) {
    if (!s) return '—';
    const v = s.val;
    if (v === null || v === undefined) return '—';
    if (typeof v === 'boolean') return v ? '● Вкл' : '○ Выкл';
    if (typeof v === 'number')  return String(Math.round(v * 1000) / 1000);
    return String(v);
}

function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showSpinner() {
    document.getElementById('mainContent').innerHTML =
        '<div class="empty" style="margin-top:40px"><div class="spinner" ' +
        'style="border-top-color:var(--accent);border-color:var(--border);width:24px;height:24px;border-width:3px;margin:0 auto"></div></div>';
}

function setStatus(msg) { document.getElementById('headerStatus').textContent = msg; }

let toastTimer;
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + (type || '');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => { t.className = 'toast'; }, 3500);
}

initSocket();
</script>
